name: Azure Static Web Apps CI/CD

on:
  push:
    branches:
      - master
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches:
      - master

jobs:
  build_and_deploy_job:
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.action != 'closed')
    runs-on: ubuntu-latest
    name: Build and Deploy Job
    steps:
      # Checkout login app (this repo)
      - uses: actions/checkout@v3
        with:
          submodules: true
          lfs: false

      # Build the login app (Vite with base: '/login')
      - name: Install and build login app
        run: |
          npm ci
          npm run build

      # Checkout the Angular portal repo (public repo, no token needed)
      - name: Checkout practitioner-portal
        uses: actions/checkout@v3
        with:
          repository: jayakrishnahealthnsw/practitioner-portal
          path: practitioner-portal-src

      # Build the Angular portal
      - name: Install and build Angular portal
        working-directory: practitioner-portal-src
        run: |
          npm ci
          npx ng build --configuration production --base-href /portal/

      # Merge outputs: login app at dist/login/, Angular portal at dist/portal/
      - name: Merge build outputs
        run: |
          mv dist dist_login_temp
          mkdir -p dist/login
          mkdir -p dist/portal
          cp -r dist_login_temp/. dist/login/
          cp -r practitioner-portal-src/dist/practitioner-portal/browser/. dist/portal/
          cp staticwebapp.config.json dist/
          echo '<html><head><meta http-equiv="refresh" content="0;url=/login"></head></html>' > dist/index.html

      - name: Build And Deploy
        id: builddeploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_WHITE_MUD_029186B0F }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: "upload"
          app_location: "dist"
          api_location: ""
          output_location: ""
          skip_app_build: true

  close_pull_request_job:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    name: Close Pull Request Job
    steps:
      - name: Close Pull Request
        id: closepullrequest
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_WHITE_MUD_029186B0F }}
          action: "close"
